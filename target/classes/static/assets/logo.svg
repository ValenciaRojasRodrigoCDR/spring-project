<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </linearGradient>
    <linearGradient id="accentMain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="textMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glowMain">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="36" fill="url(#bgMain)"/>
  <rect x="2" y="2" width="196" height="196" rx="35" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10"/>
  <rect x="1" y="1" width="198" height="198" rx="35" fill="none" stroke="url(#accentMain)" stroke-width="1.5"/>
  <line x1="14" y1="14" x2="30" y2="14" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="14" y1="14" x2="14" y2="30" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="186" y1="14" x2="170" y2="14" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="186" y1="14" x2="186" y2="30" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="14" y1="186" x2="30" y2="186" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="14" y1="186" x2="14" y2="170" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="186" y1="186" x2="170" y2="186" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="186" y1="186" x2="186" y2="170" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <text x="100" y="118" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-size="88" font-weight="900" fill="url(#textMain)" opacity="0.12" filter="url(#glowMain)">4M</text>
  <text x="100" y="118" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-size="88" font-weight="900" fill="url(#textMain)" filter="url(#glowSoft)">4M</text>
