<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=2" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div style="position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;padding:24px 20px;">
    <div class="glass login-card">

      <!-- Logo -->
      <div class="login-logo">
        <svg class="logo-ico" width="48" height="48" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="border-radius:14px;flex-shrink:0;">
          <defs>
            <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a"/>
              <stop offset="100%" stop-color="#0d0b1e"/>
            </linearGradient>
            <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
            <linearGradient id="txt2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c4b5fd"/>
              <stop offset="100%" stop-color="#93c5fd"/>
            </linearGradient>
          </defs>
          <rect width="80" height="80" rx="18" fill="url(#bg2)"/>
          <rect x="1" y="1" width="78" height="78" rx="17" fill="none" stroke="url(#acc2)" stroke-width="1.2"/>
          <line x1="7" y1="7" x2="15" y2="7" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="7" y1="7" x2="7" y2="15" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="73" y1="7" x2="65" y2="7" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="73" y1="7" x2="73" y2="15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <text x="40" y="50" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-size="36" font-weight="900" fill="url(#txt2)">4M</text>
          <line x1="14" y1="58" x2="66" y2="58" stroke="url(#acc2)" stroke-width="0.8" stroke-opacity="0.4"/>
          <text x="40" y="70" text-anchor="middle" font-family="Arial" font-size="7" font-weight="700" letter-spacing="2" fill="#94a3b8">DRINK TEAM</text>
        </svg>
      </div>

      <div class="login-title">Iniciar sesión</div>

      <form id="login-form" autocomplete="off">
        <div class="field-group">
          <label class="field-lbl">Usuario</label>
          <input id="username" class="input" type="text" placeholder="Introduce tu usuario" />
        </div>
        <div class="field-group">
          <label class="field-lbl">Contraseña</label>
          <input id="password" class="input" type="password" placeholder="Introduce tu contraseña" />
        </div>
        <span id="login-error" class="login-error"></span>
        <button type="submit" class="btn btn-primary login-btn">Entrar</button>
      </form>

      <div class="login-divider">
        <span>o continúa con</span>
      </div>

      <button class="btn btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Iniciar sesión con Google
      </button>

    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const error  = document.getElementById('login-error');
      const btn    = e.target.querySelector('button[type="submit"]');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      error.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          error.textContent = 'Usuario o contraseña incorrectos.';
          return;
        }

        const { token } = await res.json();
        localStorage.setItem('jwt_token', token);
        localStorage.setItem('username', username);
        window.location.href = '/index.html';
      } catch {
        error.textContent = 'Error de conexión. Inténtalo de nuevo.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>

</body>
</html>
