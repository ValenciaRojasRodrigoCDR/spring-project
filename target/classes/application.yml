spring:
  application:
    name: my-app

  datasource:
    url: jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: 3000

app:
  jwt:
    secret: cHJvamVjdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW5zLWNoYW5nZS1pbi1wcm9kdWN0aW9u
    expiration-ms: 86400000   # 24 h

---
# Perfil local — activa con: -Dspring.profiles.active=local
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
