<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App · Estadísticas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body>

  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="app">

    <header class="hdr" style="justify-content:space-between;">
      <button class="btn" id="back-btn">← Volver</button>
      <div class="logo-txt" id="header-title">Estadísticas</div>
      <button class="btn" id="jugadores-btn">👥 Jugadores</button>
    </header>

    <!-- KPIs -->
    <div class="kpi-strip">
      <div class="kpi glass k1">
        <div class="kpi-lbl">Jugadores</div>
        <div class="kpi-val" id="kpi-jugadores">—</div>
        <div class="kpi-sub">En el equipo</div>
      </div>
      <div class="kpi glass k2">
        <div class="kpi-lbl">Goles totales</div>
        <div class="kpi-val" id="kpi-goles">—</div>
        <div class="kpi-sub">Del equipo</div>
      </div>
      <div class="kpi glass k3">
        <div class="kpi-lbl">Máx. goleador</div>
        <div class="kpi-val" id="kpi-max-goles">—</div>
        <div class="kpi-sub" id="kpi-max-nombre">—</div>
      </div>
      <div class="kpi glass k4">
        <div class="kpi-lbl">Más partidos</div>
        <div class="kpi-val" id="kpi-max-partidos">—</div>
        <div class="kpi-sub" id="kpi-max-partidos-nombre">—</div>
      </div>
    </div>

    <!-- CLASIFICACIÓN GOLEADORES -->
    <div class="glass full-panel">
      <div class="ptitle">Clasificación goleadores</div>
      <table class="tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Jugador</th>
            <th class="tr">Goles</th>
            <th class="tr">Partidos</th>
            <th class="tr">Goles/partido</th>
          </tr>
        </thead>
        <tbody id="tabla-goleadores"></tbody>
      </table>
    </div>

    <!-- CLASIFICACIÓN PARTIDOS JUGADOS -->
    <div class="glass full-panel">
      <div class="ptitle">Clasificación partidos jugados</div>
      <table class="tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Jugador</th>
            <th class="tr">Partidos</th>
            <th class="tr">Goles</th>
            <th class="tr">Goles/partido</th>
          </tr>
        </thead>
        <tbody id="tabla-partidos"></tbody>
      </table>
    </div>

    <!-- TODO: añadir más estadísticas (rendimiento por jornada, gráficas de evolución, comparativa jugadores, etc.) -->

  </div>

  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('jwt_token')) window.location.replace('/login.html');

    const params   = new URLSearchParams(window.location.search);
    const equipoId = params.get('equipoId');

    if (!equipoId) window.location.replace('/club.html');

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = '/club.html';
    });

    document.getElementById('jugadores-btn').addEventListener('click', () => {
      window.location.href = `/jugadores.html?equipoId=${equipoId}&from=estadisticas`;
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const [equipo, jugadores] = await Promise.all([
        apiFetch(`/equipos`),
        apiFetch(`/equipos/${equipoId}/jugadores`)
      ]);

      if (equipo) {
        const e = equipo.find(e => String(e.id) === equipoId);
        if (e) document.getElementById('header-title').textContent = e.nombre;
      }

      if (!jugadores || jugadores.length === 0) return;

      // KPIs
      const totalGoles = jugadores.reduce((s, j) => s + j.totalGoals, 0);
      const topGoleador = [...jugadores].sort((a, b) => b.totalGoals - a.totalGoals)[0];
      const topPartidos = [...jugadores].sort((a, b) => b.partidosJugados - a.partidosJugados)[0];

      document.getElementById('kpi-jugadores').textContent           = jugadores.length;
      document.getElementById('kpi-goles').textContent               = totalGoles;
      document.getElementById('kpi-max-goles').textContent           = topGoleador.totalGoals;
      document.getElementById('kpi-max-nombre').textContent          = topGoleador.nombre;
      document.getElementById('kpi-max-partidos').textContent        = topPartidos.partidosJugados;
      document.getElementById('kpi-max-partidos-nombre').textContent = topPartidos.nombre;

      // Tabla goleadores
      const porGoles = [...jugadores].sort((a, b) => b.totalGoals - a.totalGoals);
      const tbodyG   = document.getElementById('tabla-goleadores');
      porGoles.forEach((j, i) => {
        const rank = i === 0 ? 'rnk-primary' : i < 3 ? 'rnk-secondary' : 'rnk-neutral';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="rnk ${rank}">${i + 1}</span></td>
          <td>${j.nombre}</td>
          <td class="tr pts-cell">${j.totalGoals}</td>
          <td class="tr">${j.partidosJugados}</td>
          <td class="tr">${j.golPorPartido?.toFixed(2) ?? '—'}</td>`;
        tbodyG.appendChild(tr);
      });

      // Tabla partidos jugados
      const porPartidos = [...jugadores].sort((a, b) => b.partidosJugados - a.partidosJugados);
      const tbodyP      = document.getElementById('tabla-partidos');
      porPartidos.forEach((j, i) => {
        const rank = i === 0 ? 'rnk-primary' : i < 3 ? 'rnk-secondary' : 'rnk-neutral';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="rnk ${rank}">${i + 1}</span></td>
          <td>${j.nombre}</td>
          <td class="tr pts-cell">${j.partidosJugados}</td>
          <td class="tr">${j.totalGoals}</td>
          <td class="tr">${j.golPorPartido?.toFixed(2) ?? '—'}</td>`;
        tbodyP.appendChild(tr);
      });
    });
  </script>

</body>
</html>
