<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App · Mi perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="app">

    <!-- HEADER -->
    <header class="hdr">
      <div class="logo">
        <svg id="logo-icon" class="logo-ico" width="96" height="96" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="border-radius:20px;flex-shrink:0;display:block;">
          <defs>
            <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a"/>
              <stop offset="100%" stop-color="#0d0b1e"/>
            </linearGradient>
            <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
            <linearGradient id="txt2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c4b5fd"/>
              <stop offset="100%" stop-color="#93c5fd"/>
            </linearGradient>
          </defs>
          <rect width="80" height="80" rx="18" fill="url(#bg2)"/>
          <rect x="1" y="1" width="78" height="78" rx="17" fill="none" stroke="url(#acc2)" stroke-width="1.2"/>
          <line x1="7" y1="7" x2="15" y2="7" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="7" y1="7" x2="7" y2="15" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="73" y1="7" x2="65" y2="7" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <line x1="73" y1="7" x2="73" y2="15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
          <text x="40" y="50" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-size="36" font-weight="900" fill="url(#txt2)">4M</text>
          <line x1="14" y1="58" x2="66" y2="58" stroke="url(#acc2)" stroke-width="0.8" stroke-opacity="0.4"/>
          <text x="40" y="70" text-anchor="middle" font-family="Arial" font-size="7" font-weight="700" letter-spacing="2" fill="#94a3b8">DRINK TEAM</text>
        </svg>
        <div>
          <div class="logo-txt">Mi perfil</div>
          <div class="logo-sub">Panel de control</div>
        </div>
      </div>
      <div class="hdr-right">
        <div class="live-dot"></div>
        <span class="live-lbl">Activo</span>
        <button class="btn" id="logout-btn" style="font-size:11px;padding:4px 12px;">Cerrar sesión</button>
      </div>
    </header>

    <!-- BIENVENIDA -->
    <div class="user-welcome glass" id="welcome-card" style="cursor:pointer;" title="Ver mi perfil">
      <div class="user-avatar" id="user-avatar">?</div>
      <div>
        <div class="user-greeting">Bienvenido,</div>
        <div class="user-name" id="user-name">—</div>
      </div>
    </div>

    <!-- OPCIONES -->
    <div class="club-grid">

      <div class="glass club-card" id="btn-mi-club">
        <div class="club-card-ico">🏆</div>
        <div class="club-card-title">Tu club</div>
        <div class="club-card-sub" id="club-sub">Cargando...</div>
        <div class="club-card-arrow">→</div>
      </div>

      <div class="glass club-card" id="btn-crear-club">
        <div class="club-card-ico">✦</div>
        <div class="club-card-title">Crear club</div>
        <div class="club-card-sub">Crea un nuevo club y empieza a gestionar tu equipo</div>
        <div class="club-card-arrow">→</div>
      </div>

      <div class="glass club-card" id="btn-importar-club">
        <div class="club-card-ico">📂</div>
        <div class="club-card-title">Importar club</div>
        <div class="club-card-sub">Importa los datos de tu club desde un fichero Excel</div>
        <div class="club-card-arrow">→</div>
      </div>

      <div class="glass club-card" id="btn-perfil">
        <div class="club-card-ico">👤</div>
        <div class="club-card-title">Mi perfil</div>
        <div class="club-card-sub">Consulta y gestiona los datos de tu cuenta de usuario</div>
        <div class="club-card-arrow">→</div>
      </div>

    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('jwt_token')) window.location.replace('/login.html');

    const username = localStorage.getItem('username') || '—';
    document.getElementById('user-name').textContent = username;
    document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('jwt_token');
      localStorage.removeItem('username');
      window.location.replace('/login.html');
    });

    async function loadEquipos() {
      const data = await apiFetch('/equipos');
      const sub  = document.getElementById('club-sub');
      if (!data || data.length === 0) {
        sub.textContent = 'No tienes equipos creados';
      } else {
        sub.textContent = data.length === 1
          ? `1 equipo · ${data[0].nombre}`
          : `${data.length} equipos`;
      }
    }
    loadEquipos();

    document.getElementById('welcome-card').addEventListener('click', () => {
      window.location.href = '/profile.html';
    });

    document.getElementById('btn-mi-club').addEventListener('click', () => {
      window.location.href = '/club.html';
    });
    document.getElementById('btn-crear-club').addEventListener('click', () => {
      window.location.href = '/crear-club.html';
    });
    document.getElementById('btn-importar-club').addEventListener('click', () => {
      window.location.href = '/import-club.html';
    });
    document.getElementById('btn-perfil').addEventListener('click', () => {
      window.location.href = '/profile.html';
    });
  </script>

</body>
</html>
