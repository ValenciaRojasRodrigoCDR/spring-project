<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App · Mi club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body>

  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="app">

    <header class="hdr" style="justify-content:space-between;">
      <button class="btn" id="back-btn">← Volver</button>
      <div class="logo-txt">Mi club</div>
      <div style="width:80px;"></div>
    </header>

    <div id="content"></div>

  </div>

  <script src="js/main.js"></script>
  <script>
    if (!localStorage.getItem('jwt_token')) window.location.replace('/login.html');

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = '/index.html';
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const equipos = await apiFetch('/equipos');
      const content = document.getElementById('content');

      if (!equipos || equipos.length === 0) {
        content.innerHTML = `
          <div class="glass full-panel" style="text-align:center;padding:48px 24px;">
            <div style="font-size:40px;margin-bottom:16px;">🏆</div>
            <div style="font-size:16px;font-weight:600;color:var(--txt);margin-bottom:8px;">No tienes equipos creados</div>
            <div style="font-size:13px;color:var(--txt2);">Cuando crees un equipo aparecerá aquí.</div>
          </div>`;
        return;
      }

      content.innerHTML = equipos.map(e => `
        <div class="glass full-panel" style="margin-bottom:var(--gap);">
          <div class="ptitle">${e.nombre}</div>
          <div class="profile-grid">
            <div class="profile-field">
              <div class="profile-lbl">Temporada</div>
              <div class="profile-val">${e.temporada ?? '—'}</div>
            </div>
            <div class="profile-field">
              <div class="profile-lbl">Liga</div>
              <div class="profile-val">${e.liga ?? '—'}</div>
            </div>
            <div class="profile-field" style="border-bottom:none;">
              <div class="profile-lbl">Descripción</div>
              <div class="profile-val">${e.descripcion ?? '—'}</div>
            </div>
            <div class="profile-field" style="border-bottom:none;">
              <div class="profile-lbl">Creado</div>
              <div class="profile-val">${e.createdAt ? new Date(e.createdAt).toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'}) : '—'}</div>
            </div>
          </div>
          <div style="margin-top:16px;display:flex;gap:8px;">
            <button class="btn btn-primary stats-btn" data-id="${e.id}">📊 Estadísticas</button>
            <button class="btn jugadores-btn" data-id="${e.id}">👥 Jugadores</button>
            <button class="btn editar-btn" data-id="${e.id}" data-nombre="${e.nombre}" data-temporada="${e.temporada ?? ''}" data-liga="${e.liga ?? ''}" data-descripcion="${e.descripcion ?? ''}">✏️ Editar</button>
          </div>
        </div>`).join('');

      content.querySelectorAll('.stats-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `/estadisticas.html?equipoId=${btn.dataset.id}`;
        });
      });

      content.querySelectorAll('.jugadores-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `/jugadores.html?equipoId=${btn.dataset.id}&from=club`;
        });
      });

      content.querySelectorAll('.editar-btn').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset));
      });
    });

    // ── Modal ──────────────────────────────────────────────────────────────
    function openModal({ id, nombre, temporada, liga, descripcion }) {
      document.getElementById('modal-id').value          = id;
      document.getElementById('modal-nombre').value      = nombre;
      document.getElementById('modal-temporada').value   = temporada;
      document.getElementById('modal-liga').value        = liga;
      document.getElementById('modal-descripcion').value = descripcion;
      document.getElementById('modal-error').textContent = '';
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    document.getElementById('edit-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.getElementById('edit-form').addEventListener('submit', async e => {
      e.preventDefault();
      const id     = document.getElementById('modal-id').value;
      const body   = {
        nombre:      document.getElementById('modal-nombre').value.trim(),
        temporada:   document.getElementById('modal-temporada').value.trim() || null,
        liga:        document.getElementById('modal-liga').value.trim() || null,
        descripcion: document.getElementById('modal-descripcion').value.trim() || null,
      };
      const errorEl = document.getElementById('modal-error');
      const result = await apiFetch(`/equipos/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      if (result === null) {
        errorEl.textContent = 'Error al guardar los cambios';
        return;
      }
      closeModal();
      window.location.reload();
    });
  </script>

  <!-- Modal editar equipo -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center;">
    <div class="glass" style="width:min(440px,92vw);padding:32px;position:relative;">
      <button onclick="closeModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;">✕</button>
      <div class="ptitle" style="margin-bottom:20px;">Editar equipo</div>
      <form id="edit-form" style="display:flex;flex-direction:column;gap:14px;">
        <input type="hidden" id="modal-id" />
        <div class="profile-field" style="border:none;padding:0;">
          <div class="profile-lbl">Nombre *</div>
          <input id="modal-nombre" class="input" type="text" required placeholder="Nombre del equipo" />
        </div>
        <div class="profile-field" style="border:none;padding:0;">
          <div class="profile-lbl">Temporada</div>
          <input id="modal-temporada" class="input" type="text" placeholder="Ej: 2024/25" />
        </div>
        <div class="profile-field" style="border:none;padding:0;">
          <div class="profile-lbl">Liga</div>
          <input id="modal-liga" class="input" type="text" placeholder="Ej: Primera División" />
        </div>
        <div class="profile-field" style="border:none;padding:0;">
          <div class="profile-lbl">Descripción</div>
          <textarea id="modal-descripcion" class="input" rows="3" placeholder="Descripción opcional" style="resize:vertical;"></textarea>
        </div>
        <div id="modal-error" style="color:var(--re);font-size:13px;min-height:18px;"></div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
    </div>
  </div>

</body>
</html>
